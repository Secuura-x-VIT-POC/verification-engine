services:
  postgres:
    image: postgres:15
    container_name: secuura-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-edi_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  db-bootstrap:
    image: postgres:15
    container_name: secuura-db-bootstrap
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-edi_db}
    command:
      [
        "sh",
        "-ec",
        "case \"$$POSTGRES_DB\" in ''|*[!A-Za-z0-9_]*) echo 'POSTGRES_DB must contain only letters, numbers, and underscores'; exit 1;; esac; until pg_isready -h postgres -U \"$$POSTGRES_USER\" -d postgres; do sleep 1; done; if ! psql -h postgres -U \"$$POSTGRES_USER\" -d postgres -tAc \"SELECT 1 FROM pg_database WHERE datname = '$$POSTGRES_DB'\" | grep -q 1; then psql -h postgres -U \"$$POSTGRES_USER\" -d postgres -c \"CREATE DATABASE \\\"$$POSTGRES_DB\\\"\"; fi",
      ]

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: secuura-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-edi_db}
      PYTHONPATH: /app
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key}
      HMAC_SECRET: ${HMAC_SECRET:-dev_secret}
      SECUURA_OCR_ENGINE: ${SECUURA_OCR_ENGINE:-pp_chatocr_v4}
      SECUURA_ENABLE_ADVANCED_PADDLE_OCR: ${SECUURA_ENABLE_ADVANCED_PADDLE_OCR:-true}
      PP_CHAT_OCR_PIPELINE: ${PP_CHAT_OCR_PIPELINE:-PP-ChatOCRv4-doc}
      PP_CHAT_OCR_DEVICE: ${PP_CHAT_OCR_DEVICE:-cpu}
      PP_CHAT_OCR_CACHE_ENGINE: ${PP_CHAT_OCR_CACHE_ENGINE:-true}
      PP_CHAT_OCR_USE_TABLE_RECOGNITION: ${PP_CHAT_OCR_USE_TABLE_RECOGNITION:-true}
      PP_CHAT_OCR_USE_SEAL_RECOGNITION: ${PP_CHAT_OCR_USE_SEAL_RECOGNITION:-false}
      PP_CHAT_OCR_USE_DOC_ORIENTATION_CLASSIFY: ${PP_CHAT_OCR_USE_DOC_ORIENTATION_CLASSIFY:-false}
      PP_CHAT_OCR_USE_DOC_UNWARPING: ${PP_CHAT_OCR_USE_DOC_UNWARPING:-false}
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: ${PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK:-True}
      PP_CHAT_OCR_CHAT_API_KEY: ${PP_CHAT_OCR_CHAT_API_KEY:-}
      PP_CHAT_OCR_CHAT_BASE_URL: ${PP_CHAT_OCR_CHAT_BASE_URL:-}
      PP_CHAT_OCR_CHAT_MODEL_NAME: ${PP_CHAT_OCR_CHAT_MODEL_NAME:-}
      PP_CHAT_OCR_RETRIEVER_API_KEY: ${PP_CHAT_OCR_RETRIEVER_API_KEY:-}
      PP_CHAT_OCR_RETRIEVER_BASE_URL: ${PP_CHAT_OCR_RETRIEVER_BASE_URL:-}
      PP_CHAT_OCR_RETRIEVER_MODEL_NAME: ${PP_CHAT_OCR_RETRIEVER_MODEL_NAME:-}
      PP_CHAT_OCR_MLLM_API_KEY: ${PP_CHAT_OCR_MLLM_API_KEY:-}
      PP_CHAT_OCR_MLLM_BASE_URL: ${PP_CHAT_OCR_MLLM_BASE_URL:-}
      PP_CHAT_OCR_MLLM_MODEL_NAME: ${PP_CHAT_OCR_MLLM_MODEL_NAME:-}
      AGENT_DYNAMIC_SCHEMA_MAX_EVIDENCE: ${AGENT_DYNAMIC_SCHEMA_MAX_EVIDENCE:-120}
      VERIFIER_EXTERNAL_PROVIDER_ENABLED: ${VERIFIER_EXTERNAL_PROVIDER_ENABLED:-0}
      VERIFIER_ENABLED_PROVIDERS: ${VERIFIER_ENABLED_PROVIDERS:-local_mock,entra_verified_id,identity_http,academic_registry_http}
      VERIFIER_PROVIDER_OPERATING_MODE: ${VERIFIER_PROVIDER_OPERATING_MODE:-LOCAL_MOCK}
      VERIFIER_LIVE_PROVIDER_ENABLED: ${VERIFIER_LIVE_PROVIDER_ENABLED:-0}
      VERIFIER_EXECUTION_ENVIRONMENT_LABEL: ${VERIFIER_EXECUTION_ENVIRONMENT_LABEL:-Docker Compose local demo}
      VERIFIER_LOCAL_VERIFICATION_STORE_PATH: ${VERIFIER_LOCAL_VERIFICATION_STORE_PATH:-/app/backend/app/verifier_providers/mock_data/registry.json}
      VERIFIER_PREFERRED_PROVIDER_RAIL: ${VERIFIER_PREFERRED_PROVIDER_RAIL:-entra_verified_id}
      AGENT_PROVIDER: ${AGENT_PROVIDER:-gemini}
      AGENT_EXTERNAL_PROVIDER_ENABLED: ${AGENT_EXTERNAL_PROVIDER_ENABLED:-0}
      AGENT_ORCHESTRATION_ENABLED: ${AGENT_ORCHESTRATION_ENABLED:-1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_KEYS: ${GEMINI_API_KEYS:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_API_KEY_PRIMARY: ${GEMINI_API_KEY_PRIMARY:-}
      GEMINI_API_KEY_1: ${GEMINI_API_KEY_1:-}
      GEMINI_API_KEY_SECONDARY: ${GEMINI_API_KEY_SECONDARY:-}
      GEMINI_API_KEY_2: ${GEMINI_API_KEY_2:-}
      GEMINI_POOL_STRATEGY: ${GEMINI_POOL_STRATEGY:-round_robin}
      GEMINI_PROVIDER_MAX_RETRIES: ${GEMINI_PROVIDER_MAX_RETRIES:-0}
      GEMINI_PROVIDER_TIMEOUT_SECONDS: ${GEMINI_PROVIDER_TIMEOUT_SECONDS:-45}
      GEMINI_POOL_COOLDOWN_SECONDS: ${GEMINI_POOL_COOLDOWN_SECONDS:-60}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_DEMO_RAW_TEXT_ENABLED: ${GEMINI_DEMO_RAW_TEXT_ENABLED:-1}
      GEMINI_MAX_INPUT_CHARS: ${GEMINI_MAX_INPUT_CHARS:-12000}
      PDF_SAFE_FLATTEN_ACTIVE_CONTENT: ${PDF_SAFE_FLATTEN_ACTIVE_CONTENT:-true}
      PDF_SAFE_FLATTEN_DPI: ${PDF_SAFE_FLATTEN_DPI:-160}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app/verifier_providers/mock_data/registry.json:/app/backend/app/verifier_providers/mock_data/registry.json:ro
      - backend_uploads:/app/uploads
      - backend_tmp:/app/tmp
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=3).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: secuura-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  backend_uploads:
  backend_tmp:
